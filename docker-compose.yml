services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./output:/app/output

  collect:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./output:/app/output
    command: ["python", "scripts/collect_weekly.py"]
    profiles:
      - tools

